<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taste China — iPhone Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 20px;
      gap: 16px;
    }

    .preview-label {
      color: #8A7560;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-weight: 700;
    }

    /* iPhone 15 Pro frame */
    .iphone-frame {
      width: 393px;
      height: 852px;
      background: #1c1c1e;
      border-radius: 50px;
      padding: 12px;
      box-shadow:
        0 0 0 3px #2a2a2c,
        0 0 0 6px #1c1c1e,
        0 0 0 8px #2a2a2c,
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 0 2px rgba(255, 255, 255, 0.05);
      position: relative;
    }

    /* Side buttons */
    .iphone-frame::before {
      content: "";
      position: absolute;
      right: -4px;
      top: 180px;
      width: 3px;
      height: 80px;
      background: #2a2a2c;
      border-radius: 0 3px 3px 0;
    }

    .iphone-frame::after {
      content: "";
      position: absolute;
      left: -4px;
      top: 200px;
      width: 3px;
      height: 60px;
      background: #2a2a2c;
      border-radius: 3px 0 0 3px;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      overflow: hidden;
      background: #FBF2E6;
      position: relative;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1c1c1e;
      border-radius: 20px;
      z-index: 10;
    }

    .iphone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 40px;
    }

    /* Status bar */
    .status-bar {
      position: absolute;
      top: 16px;
      left: 28px;
      right: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 11;
      pointer-events: none;
    }
    .status-bar .time {
      font-size: 14px;
      font-weight: 600;
      color: #2D1F14;
      width: 54px;
    }
    .status-bar .icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-bar .icons svg {
      width: 16px;
      height: 16px;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: #1c1c1e;
      border-radius: 100px;
      z-index: 10;
    }

    .open-link {
      color: #D55845;
      font-size: 12px;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.1em;
      transition: opacity 0.2s;
    }
    .open-link:hover { opacity: 0.7; }

    /* Responsive: scale down on small screens */
    @media (max-height: 900px) {
      .iphone-frame {
        transform: scale(0.85);
        transform-origin: top center;
      }
    }
    @media (max-height: 750px) {
      .iphone-frame {
        transform: scale(0.7);
        transform-origin: top center;
      }
    }
  </style>
</head>
<body>
  <span class="preview-label">📱 iPhone 15 Pro Preview</span>

  <div class="iphone-frame">
    <div class="iphone-screen">
      <!-- Dynamic Island -->
      <div class="dynamic-island"></div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="icons">
          <svg viewBox="0 0 18 12" fill="none" stroke="#2D1F14" stroke-width="1.2">
            <rect x="0.5" y="0.5" width="15" height="10" rx="2" />
            <path d="M16.5 4v3" stroke-width="1.2" stroke-linecap="round" />
            <rect x="2.5" y="2.5" width="11" height="6" rx="0.8" />
          </svg>
          <svg viewBox="0 0 16 16" fill="#2D1F14">
            <path d="M8 1a2 2 0 0 1 2 2v6a2 2 0 1 1-4 0V3a2 2 0 0 1 2-2z"/>
            <path d="M3 6a5 5 0 0 0 10 0" fill="none" stroke="#2D1F14" stroke-width="1.5"/>
            <path d="M8 12v3" stroke="#2D1F14" stroke-width="1.5"/>
          </svg>
          <svg viewBox="0 0 18 12" fill="none" stroke="#2D1F14" stroke-width="1.2">
            <rect x="1" y="3" width="16" height="8" rx="2" />
            <rect x="2.5" y="4.5" width="13" height="5" rx="0.5" fill="#2D1F14" />
            <rect x="16" y="5.5" width="1.5" height="3" rx="0.5" fill="#2D1F14" />
          </svg>
        </div>
      </div>

      <!-- App Content -->
      <iframe src="/?onboarding" title="Taste China App"></iframe>

      <!-- Home Indicator -->
      <div class="home-indicator"></div>
    </div>
  </div>

  <a class="open-link" href="/" target="_blank">Open Full Screen →</a>
</body>
</html>
